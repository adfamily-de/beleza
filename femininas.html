<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Roupas Femininas - Mira Shop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f0f0f0;
  }
  header {
    background: #fff;
    padding: 20px;
    text-align: center;
    border-bottom: 2px solid #ddd;
  }
  h1 {
    margin: 0;
    color: #222;
  }
  .produtos {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
    gap: 20px;
  }
  .produto {
    background: #fff;
    border-radius: 10px;
    width: 220px;
    padding: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
  }
  .produto img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 8px;
  }
  .produto h3 {
    margin: 10px 0 5px;
    font-size: 1.1em;
    color: #222;
  }
  .preco {
    color: #d4af37;
    font-weight: bold;
    margin-bottom: 10px;
  }
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  button {
    padding: 10px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
  }
  .info-btn {
    background-color: #555;
    color: #fff;
  }
  .compra-btn {
    background-color: #d4af37;
    color: #fff;
  }
  button:hover {
    opacity: 0.9;
  }
  footer {
    background: #222;
    color: #fff;
    padding: 20px;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>Roupas Femininas - Mira Shop</h1>
</header>

<div class="produtos" id="listaProdutos"></div>

<footer>
  &copy; 2024 Mira Shop. Todos os direitos reservados.
</footer>

<script>
  // Gerar 30 produtos fictícios
  const produtos = [];
  for (let i=1; i<=30; i++) {
    produtos.push({
      nome: `Vestido ${i}`,
      preco: `${50 + i} MT`,
      imagem: `https://images.unsplash.com/photo-1549924231-f129b911e442?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80&sig=${i}`
    });
  }

  const container = document.getElementById('listaProdutos');

  produtos.forEach(prod => {
    const div = document.createElement('div');
    div.className = 'produto';
    div.innerHTML = `
      <img src="${prod.imagem}" alt="${prod.nome}">
      <h3>${prod.nome}</h3>
      <div class="preco">${prod.preco}</div>
      <div class="buttons">
        <button class="info-btn" onclick="solicitarInfo('${prod.nome}', '${prod.preco}')">Solicitar Informação</button>
        <button class="compra-btn" onclick="comprarProduto('${prod.nome}', '${prod.preco}')">Comprar Agora</button>
      </div>
    `;
    container.appendChild(div);
  });

  function solicitarInfo(nome, preco) {
    const mensagem = encodeURIComponent(`Olá, tenho interesse em obter mais informações sobre o produto: ${nome}. Preço: ${preco}. Link do site: https://seusite.com`);
    window.open(`https://wa.me/258842644335?text=${mensagem}`, '_blank');
  }

  function comprarProduto(nome, preco) {
    const quantidade = prompt('Informe a quantidade desejada:');
    if (!quantidade || isNaN(quantidade) || quantidade <= 0) {
      alert('Quantidade inválida.');
      return;
    }
    const data = prompt('Deseja receber em uma data específica? Se sim, informe a data (DD/MM/AAAA). Caso contrário, deixe vazio.');
    let mensagemTexto = `Olá, quero comprar ${quantidade} unidade(s) do produto: ${nome}. `;
    if (data) {
      mensagemTexto += `Desejo receber em: ${data}. `;
    } else {
      mensagemTexto += `Compra imediata. `;
    }
    mensagemTexto += `Preço unitário: ${preco}. Link do produto: https://seusite.com/femininas.html`;
    const mensagem = encodeURIComponent(mensagemTexto);
    window.open(`https://wa.me/258842644335?text=${mensagem}`, '_blank');
  }
</script>
</body>
  </html>
